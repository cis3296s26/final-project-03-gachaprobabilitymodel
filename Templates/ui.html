<!DOCTYPE html>
<html>
<head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins&display=swap');
body{
  margin:0;
  background:linear-gradient(to bottom, #ffe3f1, #f3e5ff);
  font-family:'Poppins', sans-serif;
}

.top{
  background:linear-gradient(to right, #e6438f, #6b1fa1);
  color:white;
  text-align:center;
  padding:20px;
  font-size:30px;
}

.box{
  width:700px;
  max-width:90%;
  margin:auto;
  margin-top:40px;
  background:white;
  padding:25px;
  border-radius:20px;
  box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

.row{
  display:flex;
  margin-bottom:15px;
  gap:10px;
}

input, select{
  width:100%;
  padding:12px;
  border:1px solid #d9b3e6;
  border-radius:10px;
  background:#fff7fc;
  font-size:15px;
}

button{
  width:100%;
  padding:12px;
  background:linear-gradient(to right, #e6438f, #6b1fa1);
  color:white;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

#results{
  margin-top:25px;
}

.card{
  background:#fff0f7;
  border-left:5px solid #e6438f;
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
}
</style>
</head>
<body>

<div class="top">Gacha SSR Simulator</div>

<div class="box">
  <div class="row">
    <select id="game">
      <option value="fgo">Fate/Grand Order</option>
      <option value="uma">Uma Musume</option>
      <option value="hsr">Honkai: Star Rail</option>
      <option value="genshin">Genshin Impact</option>
      <option value="zzz">Zenless Zone Zero</option>
    </select>
  </div>

  <div class="row">
    <input id="currency" type="number" placeholder="Currency (gems/crystals)" value="0">
    <input id="tickets" type="number" placeholder="Pull Tickets" value="0">
  </div>

  <button onclick="calculate()">Calculate Probability</button>
  <button onclick="fetchHistogram()">Show Pull Histogram</button>

  <div id="results"></div>
    <div class="card">
      <b>SSR Pull Distribution</b>
      <canvas id="histogramChart"></canvas>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let histogramChartInstance = null;

document.getElementById("game").addEventListener("change", function() {
  fetch(`/select_game/${this.value}`)
    .then(r => r.json())
    .then(data => console.log("Game selected:", data))
    .catch(error => console.error("Error:", error));
});


function calculate(){
  const game = document.getElementById("game").value;
  const currency = parseInt(document.getElementById("currency").value) || 0;
  const tickets = parseInt(document.getElementById("tickets").value) || 0;

  fetch("/calculate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify( { game, currency, tickets } )
  })
  .then(r => r.json())
  .then(data => displayResults(data))
  .catch(error => {
    console.error("Error:", error);
    document.getElementById("results").innerHTML = `<div class="card">Error: ${error}</div>`;
  });
}

function displayResults(data) {
  document.getElementById("results").innerHTML = `
    <div class="card"><b>Game:</b> ${data.game}<br><b>Total Pulls:</b> ${data.total_pulls}</div>
    <div class="card"><b>Success Probability:</b> ${data.probability.toFixed(2)}%</div>
    <div class="card"><b>Average Pulls to First SSR:</b> ${data.average_pulls}</div>
    <div class="card"><b>Median Pulls to First SSR:</b> ${data.median_pulls}</div>
  `;
}
async function fetchHistogram() {
  const game     = document.getElementById("game").value;
  const currency = parseInt(document.getElementById("currency").value) || 3200;

  const res  = await fetch("/histogram", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ game, currency })
  });
  const data = await res.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  const labels = Object.keys(data.bins).map(k => `Roll ${k}`);
  const values = Object.values(data.bins);

  document.getElementById("histogramContainer").style.display = "block";

  // destroy previous
  if (histogramChartInstance) histogramChartInstance.destroy();

  histogramChartInstance = new Chart(document.getElementById("histogramChart"), {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "SSR Hits per Bin",
        data: values,
        backgroundColor: "rgba(230, 67, 143, 0.5)",
        borderColor: "#e6438f",
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false }
      },
      scales: {
        x: { display: false },   
        y: {
          beginAtZero: true,
          ticks: { stepSize: 1 }
        }
      }
    }
  });
}
</script>
</body>
</html>
